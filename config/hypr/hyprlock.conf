
background {
    path = ~/.config/hypr/wallpaper.png
    blur_size = 8
    blur_passes = 3
    color = rgba(0, 0, 0, 0.8)
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgb(9564fd)
    inner_color = rgb(000000)
    font_color = rgb(9564fd)
    fade_on_empty = false
    placeholder_text = <i>Senha...</i>
    hide_input = false
    position = 0, -200
    halign = center
    valign = center
}

label {
    text = I use ARCH btw
    color = rgb(9564fd)
    font_size = 28
    font_family = JetBrains Mono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

label {
    text = cmd[update:1000] echo "$(date '+%H:%M')"
    color = rgb(ffffff)
    font_size = 72
    font_family = JetBrains Mono Nerd Font
    position = 0, 200
    halign = center
    valign = center
}

