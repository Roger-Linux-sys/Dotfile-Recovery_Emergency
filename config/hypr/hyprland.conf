########################
# ----- Monitors ----- #
########################
monitor=,preferred,auto,auto


#########################
# ----- Variables ----- #
#########################
$terminal = kitty
$menu = rofi -show drun
$powerMenu = ~/.config/rofi/bin/powermenu
$scripts = ~/.config/hypr/scripts
$mainMod = SUPER
$background = ~/.config/hypr/wallpaper.png


#########################
# ----- Autostart ----- #
#########################
exec-once = dunst
exec-once = waybar
exec-once = swaybg -i $background


#############################
# ----- Look and feel ----- #
#############################

general {
    gaps_in = 10
    gaps_out = 20
    border_size = 4
    resize_on_border = true
    col.inactive_border = rgb(9564fd)
    col.active_border = rgb(9564fd)
    layout = master
}

decoration {
    rounding = 0

    blur {
        enabled = false
    }

    shadow {
        enabled = false
    }
}

bezier = easeInExpo, 0.16, 1, 0.3, 1
animation = workspaces, 1, 4, easeInExpo, slidefade 20%
animation = windows, 1, 4, easeInExpo, slide down

misc {
    force_default_wallpaper = 1
    disable_hyprland_logo = true
    enable_anr_dialog = false
}


#####################
# ----- INPUT ----- #
#####################
input {
    kb_layout = us,ru
    kb_options = grp:ctrl_space_toggle
    follow_mouse = 1
    touchpad {
        natural_scroll = false
    }
}


#####################
# ----- Binds ----- #
#####################

# - Launcher - #
bind = $mainMod, Return, exec, foot
bind = CTRL $mainMod, Return, exec, rofi -show drun

# - Apps - #

bind = $mainMod, B, exec, firefox
bind = $mainMod, C, exec, codium
bind = $mainMod, E, exec, thunar

# - Window ops - #
bind = $mainMod, Q, killactive,
bind = $mainMod, F, fullscreen, 0
bind = $mainMod ALT, F, fullscreen, 1
bind = $mainMod ALT, SPACE, togglefloating,
bind = $mainMod, P, pin,
bind = $mainMod ALT, backslash, exec, hyprctl dispatch togglefloating; hyprctl dispatch pin
bind = $mainMod, U, togglegroup,
bind = $mainMod, comma, togglegroup,
bind = $mainMod SHIFT, comma, lockactivegroup, toggle

# - Group cycle - #
bind = ALT, Tab, cyclenext,
bind = SHIFT ALT, Tab, cyclenext, prev

# - Move focus with arrows - #
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# - Move windows with arrows - #
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# - Resize windows - #
bind = $mainMod, Minus, resizeactive, -10 0
bind = $mainMod, Equal, resizeactive, 10 0
bind = $mainMod SHIFT, Minus, resizeactive, 0 -10
bind = $mainMod SHIFT, Equal, resizeactive, 0 10
bind = $mainMod ALT, left,  resizeactive, -10 0
bind = $mainMod ALT, right, resizeactive, 10 0
bind = $mainMod ALT, up,    resizeactive, 0 -10
bind = $mainMod ALT, down,  resizeactive, 0 10

# - Mouse - #
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod, Z, exec, hyprctl dispatch movewindow
bind = $mainMod, X, exec, hyprctl dispatch resizewindow

# - Switch workspace - #
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# - Move window to workspace - #
bind = $mainMod ALT, 1, movetoworkspace, 1
bind = $mainMod ALT, 2, movetoworkspace, 2
bind = $mainMod ALT, 3, movetoworkspace, 3
bind = $mainMod ALT, 4, movetoworkspace, 4
bind = $mainMod ALT, 5, movetoworkspace, 5
bind = $mainMod ALT, 6, movetoworkspace, 6
bind = $mainMod ALT, 7, movetoworkspace, 7
bind = $mainMod ALT, 8, movetoworkspace, 8
bind = $mainMod ALT, 9, movetoworkspace, 9
bind = $mainMod ALT, 0, movetoworkspace, 10

# - Prev/next workspace - #
bind = CTRL $mainMod, right, workspace, e+1
bind = CTRL $mainMod, left,  workspace, e-1
bind = $mainMod, mouse_down, workspace, e-1
bind = $mainMod, mouse_up,   workspace, e+1
bind = $mainMod, Page_Up,   workspace, e-1
bind = $mainMod, Page_Down,  workspace, e+1

# - Move window to prev/next workspace - #
bind = $mainMod ALT, mouse_down, movetoworkspace, e-1
bind = $mainMod ALT, mouse_up,   movetoworkspace, e+1
bind = $mainMod ALT, Page_Up,   movetoworkspace, e-1
bind = $mainMod ALT, Page_Down,  movetoworkspace, e+1

# - Special workspace - #
bind = $mainMod, S, togglespecialworkspace,

# - Lock & session - #
bind = $mainMod, L, exec, hyprlock
bind = $mainMod SHIFT, L, exec, systemctl suspend
bind = CTRL ALT, Delete, exec, wlogout
bind = $mainMod SHIFT, E, exec, hyprctl dispatch exit

# - Multimedia keys - #
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl  = , XF86AudioNext, exec, playerctl next
bindl  = , XF86AudioPause, exec, playerctl play-pause
bindl  = , XF86AudioPlay, exec, playerctl play-pause
bindl  = , XF86AudioPrev, exec, playerctl previous
bindl  = , XF86AudioStop, exec, playerctl stop

# - Brightness - #
bindel = , XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 10%-

# - Screenshots - #
bind = , Print, exec, $scripts/screenshot
bind = SHIFT $mainMod, 3, exec, $scripts/screenshot
bind = SHIFT $mainMod, 4, exec, $scripts/selection-screenshot

# - Utils - #
bind = $mainMod SHIFT, C, exec, hyprpicker -a
bind = $mainMod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = , F1, exec, ~/.local/bin/autoclicker.sh

# Cursor
env = XCURSOR_THEME,oneshot-niko
env = XCURSOR_SIZE,24
